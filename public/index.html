<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Gestione Ospedale</title>
    <link rel="icon" type="image/png" href="/img/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1 class="start">Gestione dell'ospedale</h1>
    </header>

    <div id="flex-opzioni">
        <div class="opzioni" id="btn-posti">
            <img class="opzioni" src="/img/posti.png" alt="Posti Letto"/> 
        </div>
        <div class="opzioni" id="btn-medicinali">
            <img class="opzioni" src="/img/medicinali.png" alt="Medicinali"/>
        </div>
    </div>
        
    <div id="sezione-split" class="nascosto">
        
        <div class="colonna-form">
            
            <div id="form-posti" class="blocco-dinamico">
                <h3>Analisi Ricoveri Stagionali</h3>
                
                <div class="campo-input">
                    <label>Seleziona Reparti:</label>
                    <div id="container-reparti">
                        <span class="testo-caricamento">Caricamento reparti...</span>
                    </div>
                </div>

                <div class="campo-input">
                    <label for="data-inizio">Anno Inizio:</label>
                    <input type="number" id="data-inizio" min="1900" max="2100" placeholder="Es. 2018">
                </div>

                <div class="campo-input">
                    <label for="data-fine">Anno Fine:</label>
                    <input type="number" id="data-fine" min="1900" max="2100" placeholder="Es. 2020">
                </div>

                <div class="campo-input">
                    <label for="nome-diagnosi">Diagnosi Principali (Scrivi e premi Invio):</label>
                    <div id="wrapper-tag-diagnosi">
                        <input type="text" id="nome-diagnosi" placeholder="Es. COVID, Sepsis...">
                    </div>
                </div>
            </div>

            <div id="form-medicinali" class="blocco-dinamico">
                <h3>Filtro Medicinali</h3>
                <div class="campo-input">
                    <label for="nome-farmaco">Nome Farmaco:</label>
                    <input type="text" id="nome-farmaco" placeholder="Es. Paracetamolo...">
                </div>
                <div class="campo-input">
                    <label for="quantita">Scorta Minima:</label>
                    <input type="number" id="quantita" min="0" value="0">
                </div>
            </div>

        </div>

        <div class="colonna-risultati">
            <div id="risultati-posti" class="blocco-dinamico">
                <div class="quadro-grafico">
                    
                    <div style="position: relative; height: 400px; width: 100%;">
                        <canvas id="graficoCartesiano"></canvas>
                    </div>
                    
                    <div id="heatmap-container"></div>
                    
                </div>
            </div>

            <div id="risultati-medicinali" class="blocco-dinamico">
                <h2>Scorte Farmacia Live</h2>
                <div class="tabella-responsiva">
                    <table>
                        <thead>
                            <tr>
                                <th>Farmaco</th>
                                <th>Quantità Disponibile</th>
                            </tr>
                        </thead>
                        <tbody id="corpo-tabella-medicinali">
                            <tr>
                                <td colspan="2" class="tabella-vuota">Seleziona i filtri dei medicinali per vedere le scorte.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <footer>
        <div class="footer-content">
            <p>Visualizzazione delle informazioni</p>
            <p class="footer-sub">Andrea Macale (560763)</p>
        </div>
    </footer>

    <script src="/js/spinner.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
